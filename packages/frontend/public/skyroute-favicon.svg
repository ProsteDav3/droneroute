<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="7" fill="#0A1628"/>
  <!-- Drone body (center) -->
  <rect x="13.5" y="13.5" width="5" height="5" rx="1.2" fill="#00C2FF"/>
  <!-- Drone arms (X pattern) -->
  <line x1="9.5" y1="9.5" x2="13.5" y2="13.5" stroke="#00C2FF" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="22.5" y1="9.5" x2="18.5" y2="13.5" stroke="#00C2FF" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="9.5" y1="22.5" x2="13.5" y2="18.5" stroke="#00C2FF" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="22.5" y1="22.5" x2="18.5" y2="18.5" stroke="#00C2FF" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Rotors (4 corners) -->
  <circle cx="9" cy="9" r="2.2" fill="none" stroke="#00C2FF" stroke-width="1.4"/>
  <circle cx="23" cy="9" r="2.2" fill="none" stroke="#00C2FF" stroke-width="1.4"/>
  <circle cx="9" cy="23" r="2.2" fill="none" stroke="#00C2FF" stroke-width="1.4"/>
  <circle cx="23" cy="23" r="2.2" fill="none" stroke="#00C2FF" stroke-width="1.4"/>
</svg>
