name: Weekly dependency update

on:
  schedule:
    # Monday 04:00 UTC — low-traffic time, well outside typical PR review hours.
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-dependency-update
  cancel-in-progress: false

jobs:
  update-and-smoke-test:
    name: Update dependencies and smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # Bump non-major versions only across the workspace root and all
      # packages/* workspaces. --target minor caps upgrades at the highest
      # version within the current major, so breaking major bumps are left
      # for Dependabot to open as individual, manually-reviewed PRs instead.
      - name: Check for non-major dependency updates
        run: npx npm-check-updates -u --target minor --workspaces --root

      - name: Install updated dependencies
        run: npm install

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- package.json package-lock.json 'packages/*/package.json'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No non-major updates available — nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # From here on, run the same quality gates as the main CI workflow
      # (.github/workflows/ci.yml) against the updated dependency tree, so a
      # bad bump fails this job loudly instead of landing in an open PR.
      # Kept as duplicated steps rather than a shared reusable workflow: the
      # updated package.json/package-lock.json only exist in this job's
      # working copy, and a workflow_call'd job would need its own fresh
      # checkout (no access to these uncommitted changes) unless we first
      # pushed an unverified branch — extra risk this workflow is meant to avoid.
      - name: Build shared (required by other packages)
        if: steps.diff.outputs.changed == 'true'
        run: npm run build -w packages/shared

      - name: Typecheck backend
        if: steps.diff.outputs.changed == 'true'
        run: npx tsc --noEmit -p packages/backend/tsconfig.json

      - name: Typecheck frontend
        if: steps.diff.outputs.changed == 'true'
        run: npx tsc --noEmit -p packages/frontend/tsconfig.json

      - name: Typecheck CLI
        if: steps.diff.outputs.changed == 'true'
        run: npx tsc --noEmit -p packages/cli/tsconfig.json

      - name: Lint
        if: steps.diff.outputs.changed == 'true'
        run: npm run lint

      - name: Format check
        if: steps.diff.outputs.changed == 'true'
        run: npm run fmt:check

      - name: Build all packages
        if: steps.diff.outputs.changed == 'true'
        run: npm run build

      - name: Test backend
        if: steps.diff.outputs.changed == 'true'
        run: npm test -w packages/backend

      - name: Test frontend
        if: steps.diff.outputs.changed == 'true'
        run: npm test -w packages/frontend

      - name: Security audit (production)
        if: steps.diff.outputs.changed == 'true'
        run: npm audit --omit=dev --audit-level=high

      # Only reached if every gate above passed. If REPO_PAT is configured
      # (see .github/workflows/dependabot-lockfile-fix.yml for the same
      # pattern), the PR is opened with a token that re-triggers the normal
      # pull_request CI checks; otherwise it falls back to GITHUB_TOKEN and
      # the PR is still opened, just without auto-triggered CI.
      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.REPO_PAT || secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): weekly non-major dependency updates"
          title: "chore(deps): weekly non-major dependency updates"
          body: |
            Automated weekly dependency update.

            - Generated by `npx npm-check-updates -u --target minor --workspaces --root`
            - Only minor and patch bumps are included — major version bumps are left
              for Dependabot to open individually for manual review
            - Build, typecheck, lint, format, test, and `npm audit` all passed
              against the updated dependency tree before this PR was opened

            This PR is infrastructure-only and carries the `skip-changelog` label.
          branch: chore/weekly-dependency-updates
          delete-branch: true
          labels: |
            dependencies
            skip-changelog
